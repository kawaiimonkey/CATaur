services:
  # Master Node: manage cluster metadata
  master:
    image: chrislusf/seaweedfs:latest
    ports:
      - "127.0.0.1:9333:9333"
    command: "master -ip=master"
    volumes:
      - ${LOCAL_DATA_PATH}/master:/data
    restart: always

  # Volume Node: store actual file data
  volume:
    image: chrislusf/seaweedfs:latest
    ports:
      - "127.0.0.1:18080:8080"
    command: "volume -mserver=master:9333 -port=8080"
    depends_on:
      - master
    volumes:
      - ${LOCAL_DATA_PATH}/volume:/data
    restart: always

  # Filer Node: provide file system interface and Web UI
  filer:
    image: chrislusf/seaweedfs:latest
    ports:
      - "127.0.0.1:8888:8888"
    command: "filer -master=master:9333"
    depends_on:
      - master
      - volume
    volumes:
      - ${LOCAL_DATA_PATH}/filer:/data
    restart: always

  # NestJS App Proxy
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # In container network, NestJS communicates directly via service name 'filer'
      - SEAWEEDFS_FILER_URL=http://filer:8888
    depends_on:
      - filer
    restart: always

networks:
  default:
    name: seaweedfs_network