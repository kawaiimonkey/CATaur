version: '3.8'

services:
  # RabbitMQ message broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: media-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP port
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - media-network
    restart: unless-stopped

  # Media processor service
  # Note: SeaweedFS is deployed in a separate docker-compose stack
  media-processor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: media-processor-service
    environment:
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      QUEUE_NAME: "media-compress-tasks"
      CONSUMER_COUNT: 1
      # SeaweedFS Filer URL (running in separate docker stack on host machine)
      SEAWEEDFS_URL: "http://host.docker.internal:8888"
      MAX_WORKERS: 4
      FFMPEG_PATH: "ffmpeg"
      TASK_TIMEOUT_SEC: 300
      LOG_LEVEL: "info"
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    networks:
      - media-network
    restart: unless-stopped
    # Allow connection to host network for external SeaweedFS
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  rabbitmq_data:

networks:
  media-network:
    driver: bridge

