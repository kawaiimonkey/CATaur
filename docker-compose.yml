services:
  webapi:
    build:
      context: ./webapi
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - web-network

  db:
    image: mariadb:latest
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_PASSWORD}
      - MARIADB_DATABASE=${DB_DATABASE}
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ~/data/mariadb:/var/lib/mysql
    networks:
      - web-network

  redis:
    image: redis:alpine
    restart: always
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}" ]
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - ~/data/redis:/data
    networks:
      - web-network

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ~/data/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ~/data/caddy/data:/data
      - ~/data/caddy/config:/config
    depends_on:
      - webapi
    networks:
      - web-network

  loki:
    image: grafana/loki:latest
    restart: always
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    networks:
      - web-network

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    depends_on:
      - loki
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - web-network
  
  gobackup:
    image: huacnlee/gobackup:latest
    restart: always
    depends_on:
      - db
    volumes:
      - ./gobackup.yml:/etc/gobackup/gobackup.yml:ro
      - ~/huang-ssh-private/id_rsa:/root/.ssh/id_rsa:ro
    networks:
      - web-network

  # SeaweedFS Services start here
  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    command: "master -ip=seaweedfs-master"
    ports:
      - "127.0.0.1:9333:9333"
    volumes:
      - ${LOCAL_DATA_PATH}/master:/data
    restart: always
    networks:
      - web-network

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    command: "volume -mserver=seaweedfs-master:9333 -port=8080"
    ports:
      - "127.0.0.1:18080:8080"
    depends_on:
      - seaweedfs-master
    volumes:
      - ${LOCAL_DATA_PATH}/volume:/data
    restart: always
    networks:
      - web-network

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    command: "filer -master=seaweedfs-master:9333"
    ports:
      - "127.0.0.1:8888:8888"
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume
    volumes:
      - ${LOCAL_DATA_PATH}/filer:/data
    restart: always
    networks:
      - web-network
  # SeaweedFS Services end here
  

  file-service:
    build:
      context: ./file-service
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - SEAWEEDFS_FILER_URL=${SEAWEEDFS_FILER_URL}
    depends_on:
      - seaweedfs-filer
    restart: always
    networks:
      - web-network

networks:
  web-network:
    driver: bridge

volumes:
  loki-data:
  grafana-data:
