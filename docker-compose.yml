# ==========================================
# DOCKER COMPOSE CONFIGURATION
# Purpose: Orchestrates all application services, handles port binding, defines volumes for persistent data, and places them in a unified network.
# ==========================================
version: "3.8"

services:
  # ==========================================
  # CORE SERVICES
  # Purpose: Hosts the frontend and backend, configured to restart automatically on failure.
  # ==========================================
  frontend:
    image: kawaiimonkey/cataur-frontend:latest
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - web-network

  webapi:
    image: kawaiimonkey/cataur-webapi:latest
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    restart: always
    networks:
      - web-network

  # ==========================================
  # REVERSE PROXY
  # Purpose: Caddy handles incoming traffic, automatic HTTPS, and proxies requests to the frontend/backend services.
  # ==========================================
  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "8880:80"
    volumes:
      - /opt/cataur/app/Caddyfile:/etc/caddy/Caddyfile
      - /opt/cataur/data/caddy/data:/data
      - /opt/cataur/data/caddy/config:/config
    depends_on:
      - webapi
      - frontend
    networks:
      - web-network

  # ==========================================
  # STORAGE CLUSTER (SeaweedFS)
  # Purpose: A highly available distributed file system split into Master (metadata), Volume (storage), and Filer (POSIX-like file API).
  # ==========================================
  # SeaweedFS Storage Cluster
  # SeaweedFS Storage Cluster
  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    command: master -ip=seaweedfs-master
    volumes:
      - ${LOCAL_DATA_PATH}/master:/data
    restart: always
    networks:
      - web-network

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    command: volume -mserver=seaweedfs-master:9333 -port=8080
    depends_on:
      - seaweedfs-master
    volumes:
      - ${LOCAL_DATA_PATH}/volume:/data
    restart: always
    networks:
      - web-network

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    command: filer -master=seaweedfs-master:9333
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume
    volumes:
      - ${LOCAL_DATA_PATH}/filer:/data
    restart: always
    networks:
      - web-network

  # ==========================================
  # FILE SERVICE
  # Purpose: Connects the main application to the internal SeaweedFS cluster.
  # ==========================================
  file-service:
    image: kawaiimonkey/cataur-fileservice:latest
    environment:
      - SEAWEEDFS_FILER_URL=${SEAWEEDFS_FILER_URL}
      - NODE_ENV=production
    depends_on:
      - seaweedfs-filer
    restart: always
    networks:
      - web-network

# ==========================================
# NETWORKS
# Purpose: A custom bridge network allowing services to communicate securely using their service names (e.g., 'http://webapi').
# ==========================================
networks:
  web-network:
    driver: bridge